<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #f8fafc;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .wrapper {
            position: relative; width: 100%; max-width: 380px; margin: 20px; z-index: 10;
        }
        .container {
            background-color: #ffffff; border-radius: 12px;
            padding: 32px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9; color: #0f172a;
            transition: box-shadow 0.3s ease;
        }
        .container:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: #0f172a; letter-spacing: -0.5px; }
        .header p { font-size: 15px; color: #64748b; }
        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; }
        .input-group label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #475569; }
        .input-group input {
            width: 100%; padding: 10px 14px; background-color: #ffffff;
            border: 1px solid #cbd5e1; border-radius: 8px;
            font-size: 15px; font-family: inherit; color: #0f172a;
            transition: all 0.2s ease; outline: none;
        }
        .input-group input::placeholder { color: #94a3b8; }
        .input-group input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { padding-right: 40px; }
        .toggle-password {
            position: absolute; right: 12px; background: none; border: none;
            color: #94a3b8; cursor: pointer; display: flex; align-items: center; padding: 0;
            transition: color 0.2s ease;
        }
        .toggle-password:hover { color: #475569; }
        .submit-btn {
            width: 100%; padding: 12px; margin-top: 10px;
            background-color: #2563eb; color: #ffffff; border: none;
            border-radius: 8px; font-size: 15px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: all 0.2s ease;
        }
        .submit-btn:hover { background-color: #1d4ed8; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .submit-btn:disabled { background-color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .message-box {
            margin-top: 16px; padding: 12px 16px; border-radius: 8px;
            font-size: 14px; text-align: center; display: none; font-weight: 500;
        }
        .message-box.success { background-color: #dcfce7; color: #065f46; border: 1px solid #a7f3d0; }
        .message-box.error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .back-link { color: #2563eb; font-weight: 600; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { text-decoration: underline; color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h2>Set New Password</h2>
                <p>Enter your new password below</p>
            </div>

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="Enter new password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('newPassword', this)" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="resetPassword()">
                Update Password
            </button>

            <div class="message-box" id="messageBox"></div>

<!-- ADD THIS -->
<p style="text-align:center; margin-top:16px; font-size:13px; color:#9CA3AF;">
    Remember your password? 
    <a href="index.html" class="back-link">
        Back to Login
    </a>
</p>
        </div>
    </div>

    <script>
        // ✅ Same Supabase credentials as your login page
        const { createClient } = supabase
        const SUPABASE_URL = 'https://owucxxsxsknujeofdbwx.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_zHDocadfoObmE3XGK1epYw_9R7xqbB6'
        const client = createClient(SUPABASE_URL, SUPABASE_KEY)

        function showMessage(text, type) {
            const box = document.getElementById('messageBox')
            box.textContent = text
            box.className = 'message-box ' + type
            box.style.display = 'block'
        }

        async function resetPassword() {
            const newPassword    = document.getElementById('newPassword').value.trim()
            const confirmPassword = document.getElementById('confirmPassword').value.trim()
            const btn = document.getElementById('submitBtn')

            // Validation
            if (!newPassword || !confirmPassword) {
                showMessage('Please complete both password fields.', 'error')
                return
            }
            if (newPassword !== confirmPassword) {
                showMessage('The provided passwords do not match.', 'error')
                return
            }
            if (newPassword.length < 6) {
                showMessage('The new password must be at least 6 characters in length.', 'error')
                return
            }

            btn.disabled = true
            btn.textContent = 'Updating...'

            // ✅ This updates the password using the token from the email link
            const { error } = await client.auth.updateUser({ password: newPassword })

            if (error) {
                showMessage(error.message, 'error')
                btn.disabled = false
                btn.textContent = 'Update Password'
            } else {
                showMessage('Password successfully updated. Redirecting to home...', 'success')
                setTimeout(() => window.location.href = 'index.html', 2000)
            }
        }

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            }
        }
    </script>
</body>
</html>
